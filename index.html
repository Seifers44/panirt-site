<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hurûf-u Mukattaa — AI Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
:root {
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a26;
  --line:rgba(255,255,255,0.07);
  --text:#e2e0f0;--dim:rgba(226,224,240,0.45);--dim2:rgba(226,224,240,0.2);
  --gold:#c8a84a;--gold-dim:rgba(200,168,74,0.12);
  --teal:#3ab8a0;--rose:#e05c7a;--violet:#9b7de8;
  --font:'Space Grotesk',sans-serif;--mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden;}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:60px 60px;
}
#app{position:relative;z-index:1;}

nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;height:56px;
  background:rgba(10,10,15,0.92);border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);
}
.nav-id{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:0.05em;}
.nav-center{display:flex;align-items:center;gap:8px;}
.nav-status{font-family:var(--mono);font-size:10px;color:var(--teal);display:flex;align-items:center;gap:8px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.lang-toggle{
  display:flex;border:1px solid var(--line);border-radius:4px;overflow:hidden;
  font-family:var(--mono);font-size:10px;letter-spacing:0.08em;
}
.lang-btn{
  padding:4px 10px;cursor:pointer;background:transparent;color:var(--dim);
  border:none;transition:all 0.2s;
}
.lang-btn.active{background:var(--gold-dim);color:var(--gold);}
.lang-btn:hover:not(.active){color:var(--text);}

.section{max-width:1160px;margin:0 auto;padding:80px 40px;}
.section+.section{border-top:1px solid var(--line);}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:100px 40px 80px;max-width:1160px;margin:0 auto;}

.hero-tag{font-family:var(--mono);font-size:11px;color:var(--teal);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:32px;display:flex;align-items:center;gap:10px;}
.hero-tag::before{content:'';display:block;width:32px;height:1px;background:var(--teal);}
.hero-arabic{font-size:clamp(52px,8vw,110px);color:var(--gold);line-height:1;margin-bottom:12px;direction:rtl;text-align:left;filter:drop-shadow(0 0 40px rgba(200,168,74,0.25));letter-spacing:0.06em;}
.hero-title{font-size:clamp(13px,1.4vw,18px);color:var(--dim);font-weight:400;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:48px;}
.hero-thesis{max-width:640px;font-size:clamp(17px,2vw,26px);font-weight:500;line-height:1.5;color:var(--text);margin-bottom:48px;}
.hero-thesis em{color:var(--gold);font-style:normal;}
.hero-findings{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:2px;border:1px solid var(--line);max-width:640px;}
.finding-cell{padding:16px 18px;background:var(--bg2);border-right:1px solid var(--line);}
.finding-cell:last-child{border-right:none;}
.fc-val{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--gold);}
.fc-label{font-size:11px;color:var(--dim);margin-top:4px;line-height:1.4;}

.sec-header{margin-bottom:48px;}
.sec-index{font-family:var(--mono);font-size:10px;color:var(--dim2);letter-spacing:0.15em;margin-bottom:12px;}
.sec-title{font-size:clamp(24px,3vw,40px);font-weight:600;color:var(--text);line-height:1.2;margin-bottom:16px;}
.sec-title span{color:var(--gold);}
.sec-body{font-size:16px;line-height:1.8;color:var(--dim);max-width:640px;}
.sec-body strong{color:var(--text);font-weight:500;}

.letter-box{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:1px solid var(--line);border-radius:4px;transition:all 0.25s;cursor:pointer;position:relative;overflow:hidden;}
.letter-box.selected{background:var(--gold-dim);border-color:rgba(200,168,74,0.3);}
.letter-box.not-selected{background:var(--bg2);opacity:0.35;}
.letter-box:hover{opacity:1!important;border-color:rgba(200,168,74,0.6);}
.lb-ar{font-size:clamp(14px,2vw,22px);color:var(--gold);}
.lb-freq{font-family:var(--mono);font-size:9px;color:var(--dim2);}
.lb-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(200,168,74,0.2);transition:height 0.4s ease;}

.half-stat{display:grid;grid-template-columns:1fr 1fr;gap:2px;border:1px solid var(--line);max-width:480px;margin-bottom:32px;}
.hs-cell{padding:20px 24px;background:var(--bg2);}
.hs-cell+.hs-cell{border-left:1px solid var(--line);}
.hs-val{font-family:var(--mono);font-size:28px;font-weight:700;}
.hs-label{font-size:12px;color:var(--dim);margin-top:6px;}

.combo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:2px;margin-bottom:40px;}
.combo-card{background:var(--bg2);border:1px solid var(--line);padding:20px 20px 16px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
.combo-card:hover{border-color:rgba(200,168,74,0.4);background:var(--bg3);}
.cc-ar{font-size:28px;direction:rtl;margin-bottom:8px;}
.cc-name{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:0.1em;margin-bottom:12px;}
.cc-suras{font-size:12px;color:var(--dim);line-height:1.6;}
.cc-sura-name{color:var(--text);}
.cc-bar-wrap{margin-top:12px;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
.cc-bar{height:100%;border-radius:2px;transition:width 0.6s ease;}

.sura-map{display:grid;grid-template-columns:repeat(19,1fr);gap:3px;margin-bottom:32px;}
.sura-cell{aspect-ratio:1;border-radius:2px;cursor:pointer;transition:all 0.2s;position:relative;}
.sura-cell:hover{transform:scale(1.4);z-index:10;}
.sura-tooltip{position:absolute;bottom:calc(100%+6px);left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid var(--line);padding:6px 10px;border-radius:4px;font-family:var(--mono);font-size:9px;color:var(--text);white-space:nowrap;z-index:20;pointer-events:none;}

.cluster-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:40px;}
.cluster-card{background:var(--bg2);border:1px solid var(--line);padding:28px;position:relative;}
.cluster-name{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px;}
.cluster-ar{font-size:32px;margin-bottom:16px;}
.cluster-similarity{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:12px;margin-bottom:8px;}
.sim-label{font-size:11px;color:var(--dim);min-width:60px;}
.sim-bar-wrap{height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
.sim-bar{height:100%;border-radius:3px;transition:width 1s ease;}
.sim-val{font-family:var(--mono);font-size:12px;font-weight:700;}
.cluster-note{font-size:12px;color:var(--dim);margin-top:12px;line-height:1.6;border-top:1px solid var(--line);padding-top:12px;}

.network-wrap{position:relative;height:400px;background:var(--bg2);border:1px solid var(--line);border-radius:4px;overflow:hidden;margin-bottom:32px;}

.verdict{background:var(--bg2);border:1px solid var(--gold);border-radius:4px;padding:40px;position:relative;overflow:hidden;margin-top:40px;}
.verdict::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(200,168,74,0.05),transparent 70%);}
.verdict-tag{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:16px;}
.verdict-title{font-size:clamp(20px,2.5vw,32px);font-weight:600;color:var(--text);margin-bottom:20px;line-height:1.3;}
.verdict-title em{color:var(--gold);font-style:normal;}
.verdict-body{font-size:16px;line-height:1.8;color:var(--dim);max-width:680px;}
.verdict-body strong{color:var(--text);font-weight:500;}
.evidence-list{margin-top:24px;display:flex;flex-direction:column;gap:10px;}
.evidence-item{display:grid;grid-template-columns:20px 1fr;gap:12px;align-items:start;font-size:14px;color:var(--dim);}

#tweaks-panel{display:none;position:fixed;bottom:20px;right:20px;z-index:200;background:rgba(10,10,15,0.97);border:1px solid rgba(200,168,74,0.3);border-radius:8px;padding:20px;min-width:220px;box-shadow:0 20px 60px rgba(0,0,0,0.7);backdrop-filter:blur(16px);}
#tweaks-panel.visible{display:block;}
.tw-title{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:16px;}
.tw-row{margin-bottom:12px;}
.tw-lbl{font-size:10px;color:var(--dim);display:block;margin-bottom:6px;font-family:var(--mono);letter-spacing:0.1em;}
.tw-sel{width:100%;background:var(--bg3);border:1px solid var(--line);color:var(--text);border-radius:4px;padding:6px 8px;font-size:12px;font-family:var(--mono);}

@keyframes reveal{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.anim{opacity:0;}.anim.go{animation:reveal 0.6s ease forwards;}

@media(max-width:768px){
  nav{padding:0 20px;}.hero,.section{padding:80px 20px 60px;}
  .cluster-grid{grid-template-columns:1fr;}
  .sura-map{grid-template-columns:repeat(10,1fr);}
}
</style>
</head>

</div>

<script>
// ── LANGUAGE SWITCH (plain JS, outside React) ─────────────────────────────
let currentLang = 'en';
function setLang(l) {
  currentLang = l;
  document.getElementById('btn-en').className = 'lang-btn' + (l==='en'?' active':'');
  document.getElementById('btn-tr').className = 'lang-btn' + (l==='tr'?' active':'');
  document.documentElement.lang = l;
  if(window.__setAppLang) window.__setAppLang(l);
  // update tweaks labels
  const isEN = l === 'en';
  document.getElementById('nav-status-label').textContent = isEN ? '8 ANALYSES COMPLETE' : '8 ANALİZ TAMAMLANDI';
  document.getElementById('tw-panel-title').textContent = isEN ? 'Tweaks' : 'Ayarlar';
  document.getElementById('tw-lbl-accent').textContent = isEN ? 'Accent Color' : 'Vurgu Rengi';
  document.getElementById('tw-lbl-mode').textContent = isEN ? 'Appearance' : 'Görünüm';
}
</script>

// ── NETWORK ───────────────────────────────────────────────────────────────
function NetworkGraph({legend}){
  const canvasRef=useRef(null);
  const [hovered,setHovered]=useState(null);
  const nodes=[
    {id:'ا',x:280,y:180,r:18,color:'#c8a84a',hub:true},
    {id:'ل',x:330,y:240,r:22,color:'#c8a84a',hub:true},
    {id:'م',x:260,y:280,r:24,color:'#c8a84a',hub:true},
    {id:'ر',x:370,y:180,r:16,color:'#c8a84a'},
    {id:'ص',x:210,y:230,r:13,color:'#c8a84a'},
    {id:'ح',x:500,y:200,r:16,color:'#3ab8a0'},
    {id:'س',x:560,y:260,r:14,color:'#3ab8a0'},
    {id:'ع',x:520,y:310,r:15,color:'#3ab8a0'},
    {id:'ق',x:460,y:310,r:13,color:'#3ab8a0'},
    {id:'ط',x:300,y:380,r:13,color:'#9b7de8'},
    {id:'ك',x:220,y:360,r:14,color:'#9b7de8'},
    {id:'ه',x:170,y:290,r:14,color:'#9b7de8'},
    {id:'ي',x:160,y:360,r:14,color:'#9b7de8'},
    {id:'ن',x:620,y:180,r:16,color:'#ff9f40',isolated:true},
  ];
  const edges=[['ا','ل',0.9],['ا','م',0.85],['ا','ر',0.8],['ل','م',0.88],['ل','ر',0.75],['م','ص',0.6],['ح','س',0.7],['ح','ع',0.65],['ح','ق',0.6],['س','ع',0.55],['ط','ك',0.6],['ط','ه',0.55],['ط','س',0.5],['ك','ه',0.65],['ه','ي',0.7],['ك','ي',0.6],['ا','ك',0.3],['م','ح',0.25]];
  useEffect(()=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    edges.forEach(([a,b,w])=>{
      const na=nodes.find(n=>n.id===a),nb=nodes.find(n=>n.id===b);
      if(!na||!nb)return;
      ctx.beginPath();ctx.moveTo(na.x,na.y);ctx.lineTo(nb.x,nb.y);
      ctx.strokeStyle=`rgba(255,255,255,${w*0.12})`;ctx.lineWidth=w*2;ctx.stroke();
    });
    nodes.forEach(node=>{
      const isH=hovered===node.id;
      if(isH||node.hub){
        const g=ctx.createRadialGradient(node.x,node.y,0,node.x,node.y,node.r*3);
        g.addColorStop(0,node.color+'40');g.addColorStop(1,'transparent');
        ctx.beginPath();ctx.arc(node.x,node.y,node.r*3,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      }
      ctx.beginPath();ctx.arc(node.x,node.y,node.r,0,Math.PI*2);
      ctx.fillStyle=isH?node.color:node.color+'aa';ctx.fill();
      ctx.strokeStyle=node.color;ctx.lineWidth=isH?2:1;ctx.stroke();
      ctx.fillStyle=isH?'#fff':'rgba(255,255,255,0.85)';
      ctx.font=`${node.hub?'bold ':''} ${node.r*0.95}px Space Grotesk`;
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(node.id,node.x,node.y);
      if(node.isolated&&isH){
        ctx.fillStyle='rgba(255,159,64,0.8)';ctx.font='10px Space Mono';
        ctx.fillText('ISOLATED',node.x+30,node.y-20);
      }
    });
  },[hovered]);
  const handleMove=useCallback(e=>{
    const canvas=canvasRef.current;if(!canvas)return;
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const found=nodes.find(n=>Math.hypot(n.x-mx,n.y-my)<n.r+6);
    setHovered(found?found.id:null);
  },[]);
  return(
    <div className="network-wrap">
      <canvas ref={canvasRef} width={760} height={400}
        style={{width:'100%',height:'100%',cursor:hovered?'pointer':'default'}}
        onMouseMove={handleMove} onMouseLeave={()=>setHovered(null)}/>
      <div style={{position:'absolute',top:16,left:16,display:'flex',gap:16,flexWrap:'wrap'}}>
        {legend.map(([c,l])=>(
          <div key={c} style={{display:'flex',alignItems:'center',gap:6,fontSize:10,color:'rgba(226,224,240,0.6)',fontFamily:'Space Mono,monospace'}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:c}}/>{l}
          </div>
        ))}
      </div>
    </div>
  );
}

        </div>
        <div style={{marginBottom:32}}>
          <div style={{fontFamily:'Space Mono,monospace',fontSize:10,color:'var(--dim2)',letterSpacing:'0.15em',marginBottom:8}}>{t.unselectedLabel}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(14,1fr)',gap:3}}>
            {UNSELECTED_LETTERS.map((l,i)=>(
              <div key={i} className="letter-box not-selected" style={{minHeight:56}}>
                <div className="lb-ar" style={{color:'rgba(226,224,240,0.4)'}}>{l.ar}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="half-stat">
          <div className="hs-cell"><div className="hs-val" style={{color:'var(--gold)'}}>693</div><div className="hs-label">{t.abjadSelected}</div></div>
          <div className="hs-cell"><div className="hs-val" style={{color:'var(--dim)'}}>5302</div><div className="hs-label">{t.abjadUnselected}</div></div>
        </div>
        <div style={{fontFamily:'Space Mono,monospace',fontSize:12,color:'var(--teal)',padding:'12px 16px',background:'rgba(58,184,160,0.06)',border:'1px solid rgba(58,184,160,0.2)',borderRadius:4,maxWidth:560}}>{t.huffmanNote}</div>
      </section>

      {/* 02 COMBINATIONS */}
      <section className="section anim">
        <div className="sec-header">
          <div className="sec-index">{t.s2index}</div>
          <h2 className="sec-title" dangerouslySetInnerHTML={{__html:t.s2title.replace(t.s2titleSpan,`<span>${t.s2titleSpan}</span>`)}}/>
          <p className="sec-body" dangerouslySetInnerHTML={{__html:t.s2body}}/>
        </div>
        <div className="combo-grid">
          {COMBINATIONS_BASE.map((c,i)=>{
            const suras=lang==='en'?c.surasEN:c.surasTR;
            return(
              <div key={i} className="combo-card"
                onClick={()=>setActiveCombo(activeCombo===i?null:i)}
                style={{borderColor:activeCombo===i?c.color:'var(--line)'}}>
                <div style={{position:'absolute',left:0,top:0,bottom:0,width:3,background:c.color,borderRadius:'4px 0 0 4px',opacity:activeCombo===i?1:0.4}}/>
                <div className="cc-ar" style={{color:c.color}}>{c.ar}</div>
                <div className="cc-name" style={{color:c.color+'aa'}}>{c.name}</div>
                <div className="cc-suras">{suras.map((s,j)=><div key={j} className="cc-sura-name">{s}</div>)}</div>
                {c.similarity&&<div>
                  <div className="cc-bar-wrap" style={{marginTop:12}}>
                    <div className="cc-bar" style={{width:`${c.similarity*100}%`,background:c.color,opacity:0.7}}/>
                  </div>
                  <div style={{fontFamily:'Space Mono,monospace',fontSize:9,color:c.color,marginTop:4}}>
                    {t.innerSim} {c.similarity} ({t.outerSim} ~0.71)
                  </div>
                </div>}
                {c.isolated&&<div style={{fontFamily:'Space Mono,monospace',fontSize:9,color:'rgba(255,159,64,0.8)',marginTop:8,padding:'4px 8px',background:'rgba(255,159,64,0.1)',borderRadius:3}}>{t.isolatedNote}</div>}
              </div>
            );
          })}
        </div>
      </section>

      {/* 03 DISTRIBUTION */}
      <section className="section anim">
        <div className="sec-header">
          <div className="sec-index">{t.s3index}</div>
          <h2 className="sec-title" dangerouslySetInnerHTML={{__html:t.s3title.replace(t.s3titleSpan,`<span>${t.s3titleSpan}</span>`)}}/>
          <p className="sec-body" dangerouslySetInnerHTML={{__html:t.s3body}}/>
        </div>
        <SuraMap t={t}/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:2,marginTop:24,border:'1px solid var(--line)'}}>
          {t.distStats.map(s=>(
            <div key={s.val} style={{padding:'20px 20px',background:'var(--bg2)',borderRight:'1px solid var(--line)'}}>
              <div style={{fontFamily:'Space Mono,monospace',fontSize:22,fontWeight:700,color:s.color}}>{s.val}</div>
              <div style={{fontSize:12,color:'var(--dim)',marginTop:4}}>{s.label}</div>
            </div>
          ))}
        </div>
      </section>

      {/* 04 CLUSTERING */}
      <section className="section anim">
        <div className="sec-header">
          <div className="sec-index">{t.s4index}</div>
          <h2 className="sec-title" dangerouslySetInnerHTML={{__html:t.s4title.replace(t.s4titleSpan,`<span>${t.s4titleSpan}</span>`)}}/>
          <p className="sec-body" dangerouslySetInnerHTML={{__html:t.s4body}}/>
        </div>
        <div className="cluster-grid">
          {t.clusters.map((g,i)=>(
            <div key={i} className="cluster-card">
              <div className="cluster-name" style={{color:g.col+'aa'}}>{g.name}</div>
              <div className="cluster-ar" style={{color:g.col}}>{g.ar}</div>
              <div className="cluster-similarity">
                <span className="sim-label" style={{color:g.col+'99',fontFamily:'Space Mono,monospace',fontSize:10}}>{t.innerLbl}</span>
                <div className="sim-bar-wrap"><div className="sim-bar" style={{width:`${g.ic*100}%`,background:g.col}}/></div>
                <span className="sim-val" style={{color:g.col}}>{g.ic}</span>
              </div>
              <div className="cluster-similarity">
                <span className="sim-label" style={{color:'var(--dim2)',fontFamily:'Space Mono,monospace',fontSize:10}}>{t.outerLbl}</span>
                <div className="sim-bar-wrap"><div className="sim-bar" style={{width:`${g.dis*100}%`,background:'rgba(255,255,255,0.2)'}}/></div>
                <span className="sim-val" style={{color:'var(--dim)'}}>{g.dis}</span>
              </div>
              <div className="cluster-note">{g.note}</div>
            </div>
          ))}
        </div>
        <div style={{fontFamily:'Space Mono,monospace',fontSize:12,color:'var(--teal)',padding:'12px 16px',background:'rgba(58,184,160,0.06)',border:'1px solid rgba(58,184,160,0.2)',borderRadius:4}}>{t.clusterNote}</div>
      </section>

      {/* 05 NETWORK */}
      <section className="section anim">
        <div className="sec-header">
          <div className="sec-index">{t.s5index}</div>
          <h2 className="sec-title" dangerouslySetInnerHTML={{__html:t.s5title.replace(t.s5titleSpan,`<span>${t.s5titleSpan}</span>`)}}/>
          <p className="sec-body" dangerouslySetInnerHTML={{__html:t.s5body}}/>
        </div>
        <NetworkGraph legend={t.netLegend}/>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:2,border:'1px solid var(--line)'}}>
          {t.netStats.map(s=>(
            <div key={s.letter} style={{padding:'18px 20px',background:'var(--bg2)',borderRight:'1px solid var(--line)'}}>
              <div style={{fontSize:28,color:s.col,marginBottom:6}}>{s.letter}</div>
              <div style={{fontFamily:'Space Mono,monospace',fontSize:11,color:s.col}}>{s.val}</div>
              <div style={{fontSize:11,color:'var(--dim)',marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>
      </section>

      {/* 06 STATE MACHINE */}
      <section className="section anim">
        <div className="sec-header">
          <div className="sec-index">{t.s6index}</div>
          <h2 className="sec-title" dangerouslySetInnerHTML={{__html:t.s6title.replace(t.s6titleSpan,`<span>${t.s6titleSpan}</span>`)}}/>
          <p className="sec-body" dangerouslySetInnerHTML={{__html:t.s6body}}/>
        </div>
        <div style={{overflowX:'auto',marginBottom:24}}>
          <table style={{fontFamily:'Space Mono,monospace',fontSize:11,borderCollapse:'collapse',minWidth:500}}>
            <thead>
              <tr>
                <th style={{background:'var(--bg)',color:'var(--dim)',padding:'8px 14px',border:'1px solid var(--line)',textAlign:'left'}}>{t.tmFrom}</th>
                {['ALM','ALR','HM','TS','NUN',t.tmNone].map(h=>(
                  <th key={h} style={{background:'var(--bg)',color:'var(--dim)',padding:'8px 12px',border:'1px solid var(--line)'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[
                {from:'ALM',vals:[4,0,0,0,0,2]},
                {from:'ALR',vals:[1,3,0,0,0,1]},
                {from:'HM', vals:[0,0,4,0,0,3]},
                {from:'TS', vals:[0,0,0,1,0,2]},
                {from:'NUN',vals:[0,0,0,0,0,1]},
                {from:t.tmNone,vals:[1,2,0,1,1,72]},
              ].map(row=>{
                const max=Math.max(...row.vals);
                return(
                  <tr key={row.from}>
                    <td style={{padding:'8px 14px',border:'1px solid var(--line)',color:'var(--dim)',background:'var(--bg2)'}}>{row.from}</td>
                    {row.vals.map((v,i)=>(
                      <td key={i} style={{padding:'8px 12px',border:'1px solid var(--line)',textAlign:'center',
                        background:v===max&&v>0?'rgba(200,168,74,0.2)':v>0?'rgba(58,184,160,0.08)':'transparent',
                        color:v===max&&v>0?'var(--gold)':v>0?'var(--teal)':'var(--dim2)',
                        fontWeight:v===max&&v>0?700:400}}>
                        {v||'—'}
                      </td>
                    ))}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        <div style={{fontFamily:'Space Mono,monospace',fontSize:11,color:'rgba(155,125,232,0.8)',padding:'12px 16px',background:'rgba(155,125,232,0.06)',border:'1px solid rgba(155,125,232,0.2)',borderRadius:4}}>{t.tmNote}</div>
      </section>

      {/* VERDICT */}
      <section className="section anim">
        <div className="verdict">
          <div className="verdict-tag">{t.verdictTag}</div>
          <div className="verdict-title">
            {t.verdictTitle1} <em>{t.verdictTitleEm1}</em> {t.verdictTitle2}<br/>
            {t.verdictTitle3} <em>{t.verdictTitleEm2}</em>{t.verdictTitle4}
          </div>
          <div className="verdict-body" dangerouslySetInnerHTML={{__html:t.verdictBody}}/>
          <div className="evidence-list">
            {t.evidence.map(([col,text])=>(
              <div key={text} className="evidence-item">
                <div style={{width:6,height:6,borderRadius:'50%',background:col,marginTop:7,flexShrink:0}}/>
                <span>{text}</span>
              </div>
            ))}
          </div>
        </div>
      </section>

      <footer style={{textAlign:'center',padding:'48px 20px',borderTop:'1px solid var(--line)',fontFamily:'Space Mono,monospace',fontSize:10,color:'var(--dim2)',letterSpacing:'0.15em'}}>
        <div>{t.footerTitle}</div>
        <div style={{marginTop:8,opacity:0.5,fontFamily:'Space Grotesk,sans-serif',fontSize:13,letterSpacing:'0.05em'}}>{t.footerSub}</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
